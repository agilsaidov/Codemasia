server:
  port: 8081

spring:
  application:
    name: api-gateway

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://localhost:8090/realms/codemasia/protocol/openid-connect/certs

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/users/**

            - id: exam-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/exams/**

            - id: group-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/groups/**

            - id: submission-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/submissions/**
