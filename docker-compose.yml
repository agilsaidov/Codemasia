services:

  # ─────────────────────────────────────────────
  # KEYCLOAK
  # ─────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: codemasia-keycloak
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    ports:
      - "8090:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - codemasia-network

  keycloak-db:
    image: postgres:16
    container_name: codemasia-keycloak-db
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codemasia-network

  # ─────────────────────────────────────────────
  # USER SERVICE DB
  # ─────────────────────────────────────────────
  user-db:
    image: postgres:16
    container_name: codemasia-user-service-db
    environment:
      POSTGRES_DB: ${USER_DB_NAME}
      POSTGRES_USER: ${USER_DB_USER}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
    ports:
      - "5437:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${USER_DB_USER} -d ${USER_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codemasia-network

  # ─────────────────────────────────────────────
  # EXAM SERVICE DB
  # ─────────────────────────────────────────────
  exam-db:
    image: postgres:16
    container_name: codemasia-exam-service-db
    environment:
      POSTGRES_DB: ${EXAM_DB_NAME}
      POSTGRES_USER: ${EXAM_DB_USER}
      POSTGRES_PASSWORD: ${EXAM_DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - exam-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${EXAM_DB_USER} -d ${EXAM_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codemasia-network

  # ─────────────────────────────────────────────
  # GROUP SERVICE DB
  # ─────────────────────────────────────────────
  group-db:
    image: postgres:16
    container_name: codemasia-group-service-db
    environment:
      POSTGRES_DB: ${GROUP_DB_NAME}
      POSTGRES_USER: ${GROUP_DB_USER}
      POSTGRES_PASSWORD: ${GROUP_DB_PASSWORD}
    ports:
      - "5435:5432"
    volumes:
      - group-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${GROUP_DB_USER} -d ${GROUP_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codemasia-network

  # ─────────────────────────────────────────────
  # SUBMISSION SERVICE DB
  # ─────────────────────────────────────────────
  submission-db:
    image: postgres:16
    container_name: codemasia-submission-service-db
    environment:
      POSTGRES_DB: ${SUBMISSION_DB_NAME}
      POSTGRES_USER: ${SUBMISSION_DB_USER}
      POSTGRES_PASSWORD: ${SUBMISSION_DB_PASSWORD}
    ports:
      - "5436:5432"
    volumes:
      - submission-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${SUBMISSION_DB_USER} -d ${SUBMISSION_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codemasia-network

  # ─────────────────────────────────────────────
  # REDIS
  # ─────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: codemasia-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codemasia-network

  # ─────────────────────────────────────────────
  # KAFKA
  # ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: codemasia-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - codemasia-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: codemasia-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - codemasia-network

# ─────────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────────
volumes:
  keycloak-db-data:
  user-db-data:
  exam-db-data:
  group-db-data:
  submission-db-data:
  redis-data:

# ─────────────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────────────
networks:
  codemasia-network:
    driver: bridge