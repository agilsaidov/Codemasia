services:

  # ─────────────────────────────────────────────
  # KEYCLOAK
  # ─────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: codemasia-keycloak
    command: start-dev
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    ports:
      - "8090:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - codemasia-network
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1g
        reservations:
          memory: 512m

  keycloak-db:
    image: postgres:16
    container_name: codemasia-keycloak-db
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME}
      POSTGRES_USER: ${KEYCLOAK_DB_USER}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codemasia-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
        reservations:
          memory: 256m

  # ─────────────────────────────────────────────
  # USER SERVICE DB
  # ─────────────────────────────────────────────
  user-db:
    image: postgres:16
    container_name: codemasia-user-service-db
    environment:
      POSTGRES_DB: ${USER_DB_NAME}
      POSTGRES_USER: ${USER_DB_USER}
      POSTGRES_PASSWORD: ${USER_DB_PASSWORD}
    ports:
      - "5437:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${USER_DB_USER} -d ${USER_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codemasia-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
        reservations:
          memory: 256m

  # ─────────────────────────────────────────────
  # EXAM SERVICE DB
  # ─────────────────────────────────────────────
  exam-db:
    image: postgres:16
    container_name: codemasia-exam-service-db
    environment:
      POSTGRES_DB: ${EXAM_DB_NAME}
      POSTGRES_USER: ${EXAM_DB_USER}
      POSTGRES_PASSWORD: ${EXAM_DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - exam-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${EXAM_DB_USER} -d ${EXAM_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codemasia-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
        reservations:
          memory: 256m

  # ─────────────────────────────────────────────
  # SUBMISSION SERVICE DB
  # ─────────────────────────────────────────────
  submission-db:
    image: postgres:16
    container_name: codemasia-submission-service-db
    environment:
      POSTGRES_DB: ${SUBMISSION_DB_NAME}
      POSTGRES_USER: ${SUBMISSION_DB_USER}
      POSTGRES_PASSWORD: ${SUBMISSION_DB_PASSWORD}
    ports:
      - "5436:5432"
    volumes:
      - submission-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${SUBMISSION_DB_USER} -d ${SUBMISSION_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codemasia-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
        reservations:
          memory: 256m

  # ─────────────────────────────────────────────
  # REDIS
  # ─────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: codemasia-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codemasia-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
        reservations:
          memory: 128m

  # ─────────────────────────────────────────────
  # KAFKA
  # ─────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: codemasia-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - codemasia-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
        reservations:
          memory: 256m

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: codemasia-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - codemasia-network
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1g
        reservations:
          memory: 512m

  # ─────────────────────────────────────────────
  # JUDGE0 — CODE EXECUTION ENGINE
  # ─────────────────────────────────────────────
  # Dedicated Postgres + Redis so Judge0's heavy queue/usage
  # never interferes with the application's own redis/databases.
  judge0-db:
    image: postgres:16
    container_name: codemasia-judge0-db
    environment:
      POSTGRES_DB: ${JUDGE0_DB_NAME}
      POSTGRES_USER: ${JUDGE0_DB_USER}
      POSTGRES_PASSWORD: ${JUDGE0_DB_PASSWORD}
    volumes:
      - judge0-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${JUDGE0_DB_USER} -d ${JUDGE0_DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codemasia-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
        reservations:
          memory: 256m

  judge0-redis:
    image: redis:7.2-alpine
    container_name: codemasia-judge0-redis
    command: redis-server --requirepass ${JUDGE0_REDIS_PASSWORD}
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${JUDGE0_REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codemasia-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
        reservations:
          memory: 128m

  judge0-server:
    image: judge0/judge0:1.13.1
    container_name: codemasia-judge0-server
    # isolate (the sandbox) requires privileged access to cgroups.
    privileged: true
    restart: unless-stopped
    ports:
      - "2358:2358"
    environment:
      POSTGRES_HOST: judge0-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${JUDGE0_DB_NAME}
      POSTGRES_USER: ${JUDGE0_DB_USER}
      POSTGRES_PASSWORD: ${JUDGE0_DB_PASSWORD}
      REDIS_HOST: judge0-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${JUDGE0_REDIS_PASSWORD}
      # API auth: callers must send these tokens (X-Auth-Token / X-Auth-User).
      # Judge0 has no other access control, so this gates code execution.
      AUTHN_TOKEN: ${JUDGE0_AUTHN_TOKEN}
      AUTHZ_TOKEN: ${JUDGE0_AUTHZ_TOKEN}
      # Allow large bursts (e.g. everyone submitting near a deadline) to queue
      # instead of being rejected with HTTP 429.
      MAX_QUEUE_SIZE: 2000
    depends_on:
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    networks:
      - codemasia-network
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 768m
        reservations:
          memory: 256m

  judge0-workers:
    image: judge0/judge0:1.13.1
    container_name: codemasia-judge0-workers
    command: [ "./scripts/workers" ]
    # isolate (the sandbox) requires privileged access to cgroups.
    privileged: true
    restart: unless-stopped
    environment:
      # Submissions executed concurrently. Kept low for local dev;
      # raise for load testing / production.
      COUNT: 2
      POSTGRES_HOST: judge0-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${JUDGE0_DB_NAME}
      POSTGRES_USER: ${JUDGE0_DB_USER}
      POSTGRES_PASSWORD: ${JUDGE0_DB_PASSWORD}
      REDIS_HOST: judge0-redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${JUDGE0_REDIS_PASSWORD}
    depends_on:
      judge0-server:
        condition: service_started
      judge0-db:
        condition: service_healthy
      judge0-redis:
        condition: service_healthy
    networks:
      - codemasia-network
    # This container actually runs untrusted submissions, so it gets
    # the largest budget. Keep memory >= COUNT * max per-submission memory_limit.
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1g
        reservations:
          memory: 512m

# ─────────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────────
volumes:
  keycloak-db-data:
  user-db-data:
  exam-db-data:
  submission-db-data:
  redis-data:
  judge0-db-data:

# ─────────────────────────────────────────────
# NETWORKS
# ─────────────────────────────────────────────
networks:
  codemasia-network:
    driver: bridge
