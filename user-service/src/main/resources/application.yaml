server:
  port: 8082

spring:
  application:
    name: user-service

  logging:
    pattern:
      console: "%d{ISO8601} [%thread] %-5level [${spring.application.name:}] %logger{36} - %msg%n"

  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  datasource:
    url: ${USER_DB_URL}
    username: ${USER_DB_USER}
    password: ${USER_DB_PASSWORD}

  flyway:
    mixed: true

keycloak:
  server-url: http://localhost:8090
  realm: codemasia
  client-id: codemasia-backend
  client-secret: ${KEYCLOAK_BACKEND_CLIENT_SECRET}
